    body { margin:0; padding:0; }
    #map { width:100%; height:100vh; }

    .photo-scroll {
      display: flex;
      align-items: flex-start;
      overflow-x: auto;
      gap: 8px;
      padding-bottom: 8px;
      -webkit-overflow-scrolling: touch;
    }

    .photo-scroll::-webkit-scrollbar {
      height: 4px;
    }
    .photo-scroll::-webkit-scrollbar-track {
      background: transparent;
    }
    .photo-scroll::-webkit-scrollbar-thumb {
      background: rgba(0,0,0,0.25);
      border-radius: 10px;
    }

    .visit-nav {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
      flex-shrink: 0;
    }

    .visit-btn {
      border: none;
      background: #f3f3f3;
      border-radius: 999px;
      width: 32px;
      height: 32px;
      font-size: 18px;
      cursor: pointer;
      line-height: 1;
    }

    .visit-btn:hover {
      background: #e5e5e5;
    }

    .visit-indicator {
      font-size: 12px;
      color: #666;
      min-width: 76px;
      text-align: center;
    }

    /* overlay */
    #overlay {
      position: fixed;
      inset: 0;
      display: none;
      justify-content: center;
      align-items: center;
      background: rgba(0, 0, 0, 0.35);
      z-index: 9999;
      padding: 16px;
      box-sizing: border-box;
    }

    #overlay.show {
      display: flex;
    }

   .overlay-card {
  position: relative;
  width: min(360px, calc(100vw - 24px));
  max-height: min(88vh, 760px);
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.22);
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 0;
  box-sizing: border-box;
}

/* 📱 手機(直) */
@media (max-width: 767px) {
  .overlay-card {
    width: min(320px, calc(100vw - 24px));
    max-height: 82vh;
  }

  .overlay-body {
    padding: 14px 13px 14px;
  }

  .photo-scroll img {
    height: 250px !important;
  }
}

/* 💻 平板以上 */
@media (min-width: 768px) {
  .overlay-card {
    width: min(420px, calc(100vw - 40px));
    max-height: min(88vh, 820px);
  }

  .overlay-body {
    padding: 16px 15px 16px;
  }

  .photo-scroll img {
    height: clamp(260px, 38vh, 380px) !important;
  }
}

/* 🔄 橫向（平板橫放 / 電腦） */
@media (min-width: 768px) and (orientation: landscape) {
  .overlay-card {
    width: min(420px, calc(100vw - 40px)); 
    max-height: 84vh;
  }

  .photo-scroll img {
    height: clamp(260px, 38vh, 380px) !important;
  }
}
    
    .overlay-close {
      position: sticky;
      top: 0;
      margin-left: auto;
      display: flex;

    }

    .overlay-close button {
      border: none;
      background: #f3f3f3;
      border-radius: 999px;
      width: 34px;
      height: 34px;
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
    }

      background: #e5e5e5;
    }

    .overlay-body {
      padding: 14px 13px 14px;

#photo-viewer {
  position: fixed;
  inset: 0;
  display: none;
  justify-content: center;
  align-items: center;
  background: #000; /* 整個畫面黑色 */
  z-index: 10000;
  touch-action: pan-x pan-y pinch-zoom;
}

#photo-viewer-close {
  position: fixed;
  top: 14px;
  left: 14px;
  z-index: 10001;

  width: 28px;
  height: 28px;
  padding: 0;

  border: none;
  border-radius: 50%;
  background: rgba(255,255,255,0.18);

  display: flex;
  align-items: center;
  justify-content: center;

  cursor: pointer;
  appearance: none;
  -webkit-appearance: none;
}

#photo-viewer-close::before,
#photo-viewer-close::after {
  content: "";
  position: absolute;
  width: 14px;
  height: 1.5px;
  background: white;
  border-radius: 999px;
}

#photo-viewer-close::before {
  transform: rotate(45deg);
}

#photo-viewer-close::after {
  transform: rotate(-45deg);
}

#photo-viewer.show {
  display: flex;
}

#photo-viewer-img {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: contain; /* 保持完整圖片 */
  background: #000;
}

#timeline-wrap {
  position: fixed;
  left: 50%;
  bottom: 10px;
  transform: translateX(-50%);
  z-index: 9998;

  width: min(700px, calc(100vw - 80px));

  display: flex;              
  flex-direction: column;     
  align-items: center;       

  background: transparent;   
  padding: 0;               
  box-shadow: none;  

  /* ⭐ 防止 iPad 把拖時間軸判定成滑整頁 */
  touch-action: none;
  -webkit-user-select: none;
  user-select: none;
}

#timeline-label {
  border: none;
  background: rgba(255,255,255,0.15);   /* 半透明白泡泡 */
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);

  color: #ffffff;
  font-size: 13px;
  font-family: sans-serif;
  text-align: center;

  padding: 6px 12px;
  border-radius: 999px;
  margin-bottom: 3px;

  cursor: pointer;
  box-shadow: none;
}

#timeline-label:hover {
  background: rgba(255,255,255,0.6);
}

#timeline-label:active {
  transform: scale(0.98);
}

#timeline-slider {
  -webkit-appearance: none;
  appearance: none;
  display: block;
  width: 100%;
  margin: 0;

  /* ⭐ 重點：視覺上還是細線，但手指可抓範圍變大 */
  height: 32px;
  background: transparent;
  border-radius: 999px;
  outline: none;

  /* ⭐ iPad / 手機避免整頁被滑走 */
  touch-action: none;
  -webkit-user-select: none;
  user-select: none;
}

#timeline-slider::-webkit-slider-runnable-track {
  height: 3px;
  background: rgba(255,255,255,0.25);
  border-radius: 999px;
}

#timeline-slider::-moz-range-track {
  height: 3px;
  background: rgba(255,255,255,0.25);
  border-radius: 999px;
}

/* ⭐ 這段才是滑塊 */
#timeline-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;

  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: #ffffff;

  cursor: pointer;
  box-shadow: 0 2px 6px rgba(0,0,0,0.25);

  /* ⭐ 讓白色圓點對齊 3px 時間軸中央 */
  margin-top: -4.5px;
}

#place-index-toggle {
  position: fixed;
  right: 18px;
  bottom: 44px;
  z-index: 9998;

  border: none;
  border-radius: 999px;
  padding: 6px 12px;

  background: rgba(255,255,255,0.78);

  -webkit-backdrop-filter: blur(6px);

  color: #333;
  font-size: 13px;
  font-family: sans-serif;
  cursor: pointer;
}

#place-index-panel {
  position: fixed;
  right: 16px;
  bottom: 92px;
  z-index: 9999;

  width: min(340px, calc(100vw - 32px));
  max-height: min(68vh, 560px);

  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);

  border-radius: 16px;
  box-shadow: 0 8px 28px rgba(0,0,0,0.22);

  overflow: hidden;
  display: none;
  font-family: sans-serif;
}

#place-index-panel.show {
  display: block;
}

.place-index-header {
  position: sticky;
  top: 0;
  z-index: 1;

  display: flex;
  justify-content: space-between;
  align-items: center;

  padding: 12px 14px;
  background: rgba(255,255,255,0.95);
  border-bottom: 1px solid rgba(0,0,0,0.08);
}

#place-index-close {
  border: none;
  background: #f1f1f1;
  border-radius: 999px;
  width: 28px;
  height: 28px;
  font-size: 18px;
  line-height: 1;
  cursor: pointer;

  color: #333;
  appearance: none;
  -webkit-appearance: none;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}

#place-index-content {
  padding: 10px 14px 56px 24px;
  overflow-y: auto;
  max-height: calc(min(68vh, 560px) - 53px);
}

.index-bottom-spacer {
  height: 28px;
  flex-shrink: 0;
}

#place-index-content::-webkit-scrollbar {
  width: 6px;
}

#place-index-content::-webkit-scrollbar-track {
  background: transparent;
}

#place-index-content::-webkit-scrollbar-thumb {
  background: rgba(0,0,0,0.22);
  border-radius: 999px;
}

#place-index-content::-webkit-scrollbar-thumb:hover {
  background: rgba(0,0,0,0.32);
}

.index-county {
  margin-top: 24px;
  font-size: 15px;
  font-weight: 700;
  color: #222;
}

}

.index-district {
  margin-top: 8px;

  font-size: 13px;
  font-weight: 700;
  color: #666;
}

.index-place-row {
  margin: 3px 0 3px 30px;
  font-size: 13px;
  line-height: 1.5;
  color: #333;
}

.index-place-name {
  font-weight: 500;
  color: #333;
}

.index-date-list {
  color: #888;
}

.index-date-btn {
  border: none;
  background: transparent;
  padding: 0;
  margin: 0 0 0 0px;

  font-size: 12px;
  font-family: sans-serif;
  cursor: pointer;
  text-decoration: none;
  text-underline-offset: 3px;

.index-date-btn::before {

  display: inline-block;
  margin-right: 0px;
}

.index-date-btn:hover {

}

.index-date {

  font-size: 12px;

/* 手機版：避免擋到底下時間軸 */

  }

function normalizeDate(dateStr) {
  if (!dateStr) return null;

  let s = dateStr.replace("~", "-");

  const match = s.match(/^(\d{4})\.(\d{2})\.(\d{2})/);
  if (!match) return null;

  return `${match[1]}-${match[2]}-${match[3]}`;
}

function createPhotoHTML(photos, imgHeight = 220) {
  const photosJson = encodeURIComponent(JSON.stringify(photos));

  return `
    <div class="photo-scroll">
      ${photos.map((p, i) => `
        <div style="
          flex-shrink:0;
          display:flex;
          flex-direction:column;
          align-items:flex-start;
          justify-content:flex-start;
        ">
          <img src="${p.img}"
            alt="${p.title || ''}"
            class="clickable-photo"
            data-photos="${photosJson}"
            data-index="${i}"
            style="
              width:auto;
              height:${imgHeight}px;
              border-radius:10px;
              display:block;
              cursor:pointer;
            ">

          <div style="
            width:0;
            min-width:100%;
            max-width:100%;
            font-size:14px;
            color:#444;
            margin-top:8px;
            flex-grow:1;
            display:flex;
            align-items:flex-start;
            text-align:left;
            white-space:normal;
            overflow-wrap:anywhere;
            word-break:break-word;
            line-height:1.35;
            box-sizing:border-box;
          ">
            ${p.title}
          </div>
        </div>
      `).join("")}
    </div>
  `;
}


/* 🌿 7. 單次卡片 */
function createSinglePopup(date, place, route, photos, note) {
  return `
    <div style="font-size:16px;">
      🌿 <b>${date}</b><br><br>
    </div>

    <div style="display:flex; align-items:center; gap:4px; font-size:16px;">
      <span>📍</span>
      <b>${place}</b>
    </div>

    <div style="font-size:14px;">
      ${route}
      <br><br>
    </div>

    ${createPhotoHTML(photos, 220)}

    <div style="
      font-size:14px;
      line-height:1.5;
      margin-top:10px;
      padding-bottom:8px;
    ">
      ${note}
    </div>
  `;
}


/* 🌿 8. repeat 卡片 */
function createRepeatPopup(place, visits, markerId) {
  let currentIndex = repeatState[markerId] || 0;
  if (currentIndex < 0) currentIndex = 0;
  if (currentIndex > visits.length - 1) currentIndex = visits.length - 1;

  const visit = visits[currentIndex];

  return `
    <div class="visit-nav" style="margin-bottom:8px;">
      <button
        type="button"
        class="visit-btn"
        onclick="event.stopPropagation(); changeVisit('${markerId}', -1); return false;"
      >‹</button>

      <div class="visit-indicator">${currentIndex + 1} / ${visits.length}</div>

      <button
        type="button"
        class="visit-btn"
        onclick="event.stopPropagation(); changeVisit('${markerId}', 1); return false;"
      >›</button>
    </div>

    <div style="font-size:16px;">
      🌿 <b>${visit.date}</b><br><br>
    </div>

    <div style="display:flex; align-items:center; gap:4px; font-size:16px;">
      <span>📍</span>
      <b>${place}</b>
    </div>

    <div style="font-size:14px;">
      ${visit.route}
      <br><br>
    </div>

    ${createPhotoHTML(visit.photos, 200)}

    <div style="
      font-size:14px;
      line-height:1.5;
      margin-top:12px;
    ">
      ${visit.note}
    </div>
  `;
}


/* 🌿 9. overlay 開關 */
function openOverlay(html) {
  const overlay = document.getElementById('overlay');
  const content = document.getElementById('overlay-content');

  content.innerHTML = html;
  overlay.classList.add('show');
  document.body.style.overflow = 'hidden';

  const photos = content.querySelectorAll('.clickable-photo');
  photos.forEach(photo => {
    photo.addEventListener('click', function () {
      const photosData = JSON.parse(decodeURIComponent(this.dataset.photos));
      const index = Number(this.dataset.index);
      openPhotoViewer(photosData, index);
    });
  });
}

function closeOverlay() {
  const overlay = document.getElementById('overlay');
  overlay.classList.remove('show');
  document.body.style.overflow = '';
}

document.getElementById('overlay').addEventListener('click', function (e) {
  if (e.target.id === 'overlay') {
    closeOverlay();
  }
});

document.getElementById('overlay-card').addEventListener('click', function (e) {
  e.stopPropagation();
});

function openPhotoViewer(photos, index) {
  viewerPhotos = photos;
  viewerIndex = index;
  renderPhotoViewer();
  document.getElementById('photo-viewer').classList.add('show');
}

function renderPhotoViewer() {
  const img = document.getElementById('photo-viewer-img');
  if (!viewerPhotos.length) return;

  img.src = viewerPhotos[viewerIndex].img;
  img.alt = viewerPhotos[viewerIndex].title || "";
}

function showNextPhoto() {
  if (!viewerPhotos.length) return;
  if (viewerIndex < viewerPhotos.length - 1) {
    viewerIndex++;
    renderPhotoViewer();
  }
}

function showPrevPhoto() {
  if (!viewerPhotos.length) return;
  if (viewerIndex > 0) {
    viewerIndex--;
    renderPhotoViewer();
  }
}

function closePhotoViewer() {
  document.getElementById('photo-viewer').classList.remove('show');
  document.getElementById('photo-viewer-img').src = "";
  document.getElementById('photo-viewer-img').alt = "";
  viewerPhotos = [];
  viewerIndex = 0;
}

document.getElementById('photo-viewer-close').addEventListener('click', function (e) {
  e.stopPropagation();
  closePhotoViewer();
});

document.addEventListener('keydown', function (e) {
  const viewer = document.getElementById('photo-viewer');

  // 只有在大圖 viewer 打開時才作用
  if (!viewer.classList.contains('show')) return;

  if (e.key === 'ArrowRight') {
    showNextPhoto();
  } else if (e.key === 'ArrowLeft') {
    showPrevPhoto();
  } else if (e.key === 'Escape') {
    closePhotoViewer();
  }
});


/* 🌿 10. 翻頁 */
function changeVisit(markerId, direction) {
  const item = repeatMarkers[markerId];
  if (!item) return;

  const total = item.visits.length;
  let currentIndex = repeatState[markerId] || 0;

  currentIndex += direction;

  if (currentIndex < 0) currentIndex = 0;
  if (currentIndex > total - 1) currentIndex = total - 1;

  repeatState[markerId] = currentIndex;

  const newHtml = createRepeatPopup(item.place, item.visits, markerId);
  openOverlay(newHtml);
}


/* 🌿 11. 建立 markers */
data.forEach((item, idx) => {
  let [
    date, lat, lng,
    place, route,
    photos,
    note, status,
    visits
  ] = item;

  let color = iconColor[status] || "#64b5f6";

  // ✅ repeat：每一天都建立一個 marker / timeline item
  if (status === "repeat" && Array.isArray(visits) && visits.length > 0) {

    visits.forEach((visit, visitIndex) => {
      const markerId = `marker-${idx}-${visitIndex}`;
      const markerDate = normalizeDate(visit.date);

      let marker = L.marker([lat, lng], {
        icon: createPinIcon(color)
      });

      marker.timelineDate = markerDate;
      marker.rawDate = visit.date;

      markers.push(marker);
      timelineDates.push(markerDate);

      // ⭐ 每一天都放進 timelineItems
      const meta = locationMeta[place] || { county: "未分類", district: "未分類" };

      timelineItems.push({
      date: markerDate,
      rawDate: visit.date,
      place: place,
      county: meta.county,
      district: meta.district,
      marker: marker
    });

      marker.on('click', function () {
        repeatState[markerId] = visitIndex;

        repeatMarkers[markerId] = {
          marker: marker,
          place: place,
          visits: visits
        };

        const html = createRepeatPopup(place, visits, markerId);
        openOverlay(html);
      });
    });

  } else {
    // ✅ 一般單日資料
    const markerId = `marker-${idx}`;
    const markerDate = normalizeDate(date);

    let marker = L.marker([lat, lng], {
      icon: createPinIcon(color)
    });

    marker.timelineDate = markerDate;
    marker.rawDate = date;

    markers.push(marker);
    timelineDates.push(markerDate);

    const meta = locationMeta[place] || { county: "未分類", district: "未分類" };

    timelineItems.push({
    date: markerDate,
    rawDate: date,
    place: place,
    county: meta.county,
    district: meta.district,
    marker: marker
  });

    marker.on('click', function () {
      const html = createSinglePopup(date, place, route, photos, note);
      openOverlay(html);
    });
  }
});

  
// ⭐ 不要用 unique，因為同一天/同地點也可能要分開顯示
timelineItems.sort((a, b) => a.date.localeCompare(b.date));

const timelineSlider = document.getElementById('timeline-slider');
const timelineLabel = document.getElementById('timeline-label');
const timelineWrap = document.getElementById('timeline-wrap');

// ⭐ 防止時間軸上的手勢被 Leaflet 地圖吃掉
L.DomEvent.disableClickPropagation(timelineWrap);
L.DomEvent.disableScrollPropagation(timelineWrap);

// ⭐ iPad / 手機：手指碰到時間軸區域時，不要把事件傳給地圖
timelineWrap.addEventListener('touchstart', function(e) {
  e.stopPropagation();
}, { passive: true });

timelineWrap.addEventListener('touchmove', function(e) {
  e.stopPropagation();
}, { passive: true });

timelineWrap.addEventListener('pointerdown', function(e) {
  e.stopPropagation();
});

timelineWrap.addEventListener('pointermove', function(e) {
  e.stopPropagation();
});

timelineSlider.max = timelineItems.length - 1;
timelineSlider.value = 0;

function updateTimeline(index) {
  const currentItem = timelineItems[index];
  if (!currentItem) return;

  const currentDate = currentItem.date;

  markers.forEach(marker => {
    if (marker.timelineDate <= currentDate) {
      if (!map.hasLayer(marker)) {
        marker.addTo(map);
      }
    } else {
      if (map.hasLayer(marker)) {
        map.removeLayer(marker);
      }
    }
  });

  const currentDateText = currentDate.replace(/-/g, ".");
  timelineLabel.textContent = `Until ${currentDateText}`;

  // ⭐ 滑到哪一天，泡泡就對應哪一天的 marker
  currentTimelineMarker = currentItem.marker;
}

timelineSlider.addEventListener('input', function () {
  updateTimeline(Number(this.value));
});

timelineLabel.addEventListener('click', function () {
  if (!currentTimelineMarker) return;
  currentTimelineMarker.fire('click');
});

// 初始
updateTimeline(0);

function buildPlaceIndex() {
  const content = document.getElementById('place-index-content');

  const grouped = {};

  timelineItems.forEach(item => {
    const county = item.county || "未分類";
    const district = item.district || "未分類";
    const place = item.place || "未命名地點";

    if (!grouped[county]) grouped[county] = {};
    if (!grouped[county][district]) grouped[county][district] = {};
    if (!grouped[county][district][place]) grouped[county][district][place] = [];

    grouped[county][district][place].push(item);
  });

  let html = "";

  const countyOrder = ["臺北市", "新北市", "宜蘭縣", "新竹縣", "臺中市", "屏東縣", "未分類"];

Object.keys(grouped)
  .sort((a, b) => {
    const ai = countyOrder.indexOf(a);
    const bi = countyOrder.indexOf(b);

    if (ai !== -1 && bi !== -1) return ai - bi;
    if (ai !== -1) return -1;
    if (bi !== -1) return 1;

    return a.localeCompare(b, "zh-Hant");
  })
  .forEach(county => {
    html += `<div class="index-county">${county}</div>`;

    Object.keys(grouped[county]).sort().forEach(district => {
      html += `<div class="index-district">${district}</div>`;

    Object.keys(grouped[county][district])
  .sort((placeA, placeB) => {
    const firstDateA = grouped[county][district][placeA]
      .map(item => item.date)
      .sort()[0];

    const firstDateB = grouped[county][district][placeB]
      .map(item => item.date)
      .sort()[0];

    return firstDateA.localeCompare(firstDateB);
  })
  .forEach(place => {
    const items = grouped[county][district][place]
      .sort((a, b) => a.date.localeCompare(b.date));

    html += `
      <div class="index-place-row">
        <span class="index-place-name">${place}</span>
        <span class="index-date-list">
          ${items.map(item => `
            <button 
              class="index-date-btn" 
              type="button" 
              data-date="${item.date}"
            >
              ${item.rawDate || item.date}
            </button>
          `).join("")}
        </span>
      </div>
    `;
  });
    });
  });

  content.innerHTML = html + `<div class="index-bottom-spacer"></div>`;

  content.querySelectorAll('.index-date-btn').forEach(btn => {
    btn.addEventListener('click', function () {
      const date = this.dataset.date;
      const item = timelineItems.find(x => x.date === date);

      if (!item) return;

      const index = timelineItems.findIndex(x => x.date === date);
      if (index >= 0) {
        timelineSlider.value = index;
        updateTimeline(index);
      }

      item.marker.fire('click');

      document.getElementById('place-index-panel').classList.remove('show');
    });
  });
}

const placeIndexToggle = document.getElementById('place-index-toggle');
const placeIndexPanel = document.getElementById('place-index-panel');
const placeIndexClose = document.getElementById('place-index-close');

placeIndexToggle.addEventListener('click', function () {
  placeIndexPanel.classList.toggle('show');
});

placeIndexClose.addEventListener('click', function () {
  placeIndexPanel.classList.remove('show');
});

// 防止點索引時拖到地圖
L.DomEvent.disableClickPropagation(placeIndexPanel);
L.DomEvent.disableScrollPropagation(placeIndexPanel);

buildPlaceIndex();

let touchStartX = 0;
let touchStartY = 0;
let touchEndX = 0;
let touchEndY = 0;
let isPinching = false;

const viewerCard = document.getElementById('photo-viewer');

viewerCard.addEventListener('touchstart', function (e) {
  isPinching = e.touches.length > 1;

  if (isPinching) return;

  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

viewerCard.addEventListener('touchmove', function (e) {
  if (e.touches.length > 1) {
    isPinching = true;
  }
}, { passive: true });

viewerCard.addEventListener('touchend', function (e) {
  if (isPinching) {
    if (e.touches.length === 0) {
      isPinching = false;
    }
    return;
  }

  touchEndX = e.changedTouches[0].clientX;
  touchEndY = e.changedTouches[0].clientY;

  const diffX = touchEndX - touchStartX;
  const diffY = touchEndY - touchStartY;

  if (Math.abs(diffY) > 80 && Math.abs(diffY) > Math.abs(diffX)) {
    closePhotoViewer();
    return;
  }

  if (Math.abs(diffX) > 60 && Math.abs(diffX) > Math.abs(diffY)) {
    if (diffX < 0) {
      showNextPhoto();
    } else {
      showPrevPhoto();
    }
  }
}, { passive: true });


document.addEventListener('wheel', function (e) {
  const scroller = e.target.closest('.photo-scroll');
  if (!scroller) return;

  // 如果主要是垂直滾動，就把它轉成水平滾動
  if (Math.abs(e.deltaY) > Math.abs(e.deltaX)) {
    e.preventDefault();
    scroller.scrollLeft += e.deltaY;
  }
}, { passive: false });

</script>
