<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8" />
  <title>我們的地圖</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    body { margin:0; padding:0; }
    #map { width:100%; height:100vh; }

    .photo-scroll {
      display: flex;
      align-items: flex-start;
      overflow-x: auto;
      gap: 8px;
      padding-bottom: 8px;
      -webkit-overflow-scrolling: touch;
    }

    .photo-scroll::-webkit-scrollbar {
      height: 4px;
    }
    .photo-scroll::-webkit-scrollbar-track {
      background: transparent;
    }
    .photo-scroll::-webkit-scrollbar-thumb {
      background: rgba(0,0,0,0.25);
      border-radius: 10px;
    }

    .visit-nav {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
      flex-shrink: 0;
    }

    .visit-btn {
  border: none;
  background: #f3f3f3;
  border-radius: 50%;

  width: 32px;
  height: 32px;
  min-width: 32px;
  min-height: 32px;
  padding: 0;

  display: flex;
  align-items: center;
  justify-content: center;

  font-size: 18px;
  line-height: 1;
  cursor: pointer;
  color: #111;

  appearance: none;
  -webkit-appearance: none;
  flex-shrink: 0;
}

    .visit-btn:hover {
      background: #e5e5e5;
    }

    .visit-indicator {
      font-size: 12px;
      color: #666;
      min-width: 76px;
      text-align: center;
    }

    /* overlay */
    #overlay {
      position: fixed;
      inset: 0;
      display: none;
      justify-content: center;
      align-items: center;
      background: rgba(0, 0, 0, 0.35);
      z-index: 9999;
      padding: 16px;
      box-sizing: border-box;
    }

    #overlay.show {
      display: flex;
    }

   .overlay-card {
  position: relative;
  width: min(360px, calc(100vw - 24px));
  max-height: min(88vh, 760px);
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.22);
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 0;
  box-sizing: border-box;
}

/* 📱 手機(直) */
@media (max-width: 767px) {
  .overlay-card {
    width: min(320px, calc(100vw - 24px));
    max-height: 84vh;
  }

  .overlay-body {
    padding: 14px 13px 14px;
  }

  .photo-scroll img {
    height: 270px !important;
  }
}

/* 💻 平板以上：iPad 直式 / 電腦基本設定 */
@media (min-width: 768px) {
  .overlay-card {
    width: min(500px, calc(100vw - 80px));
    max-height: min(88vh, 900px);
  }

  .overlay-body {
    padding: 20px 20px 22px;
    font-size: 16px;
  }

  .photo-scroll img {
    height: clamp(300px, 44vh, 500px) !important;
  }

  .overlay-body h2,
  .overlay-body h3 {
    font-size: 22px;
  }

  .overlay-body p {
    font-size: 16px;
    line-height: 1.75;
  }
}

/* 🔄 橫向：iPad 橫放 / 電腦大螢幕再放大一點 */
@media (min-width: 768px) and (orientation: landscape) {
  .overlay-card {
    width: min(520px, calc(100vw - 80px)); 
    max-height: 88vh;
  }

  .photo-scroll img {
    height: clamp(330px, 48vh, 520px) !important;
  }
}
    
    .overlay-close {
      position: sticky;
      top: 0;
      margin-left: auto;
      display: flex;
      justify-content: flex-end;
      z-index: 2;
      background: linear-gradient(to bottom, rgba(255,255,255,1), rgba(255,255,255,0.9));
      padding-bottom: 6px;
    }

    .overlay-close button {
      border: none;
      background: #f3f3f3;
      border-radius: 999px;
      width: 34px;
      height: 34px;
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
    }

    .overlay-close button:hover {
      background: #e5e5e5;
    }

    .overlay-body {
      padding: 14px 13px 14px;
      font-family: sans-serif;
    }

#photo-viewer {
  position: fixed;
  inset: 0;
  display: none;
  justify-content: center;
  align-items: center;
  background: #000; /* 整個畫面黑色 */
  z-index: 10000;
  touch-action: pan-x pan-y pinch-zoom;
}

#photo-viewer-close {
  position: fixed;
  top: 14px;
  left: 14px;
  z-index: 10001;

  width: 28px;
  height: 28px;
  padding: 0;

  border: none;
  border-radius: 50%;
  background: rgba(255,255,255,0.18);

  display: flex;
  align-items: center;
  justify-content: center;

  cursor: pointer;
  appearance: none;
  -webkit-appearance: none;
}

#photo-viewer-close::before,
#photo-viewer-close::after {
  content: "";
  position: absolute;
  width: 14px;
  height: 1.5px;
  background: white;
  border-radius: 999px;
}

#photo-viewer-close::before {
  transform: rotate(45deg);
}

#photo-viewer-close::after {
  transform: rotate(-45deg);
}

#photo-viewer.show {
  display: flex;
}

#photo-viewer-img {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: contain;
  background: #000;

  transform:
    translate(var(--photo-x, 0px), var(--photo-y, 0px))
    scale(var(--photo-scale, 1));
  transform-origin: center center;
  transition: transform 0.12s ease;

  cursor: grab;
  user-select: none;
  -webkit-user-select: none;
  -webkit-user-drag: none;
  user-drag: none;
  touch-action: none;
}

#photo-viewer-img.dragging {
  cursor: grabbing;
  transition: none;
}

#timeline-wrap {
  position: fixed;
  left: 50%;
  bottom: 10px;
  transform: translateX(-50%);
  z-index: 9998;

  width: min(700px, calc(100vw - 80px));

  display: flex;              
  flex-direction: column;     
  align-items: center;       

  background: transparent;   
  padding: 0;               
  box-shadow: none;  

  /* ⭐ 防止 iPad 把拖時間軸判定成滑整頁 */
  touch-action: none;
  -webkit-user-select: none;
  user-select: none;
}

#timeline-label {
  border: none;
  background: rgba(255,255,255,0.15);   /* 半透明白泡泡 */
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);

  color: #ffffff;
  font-size: 13px;
  font-family: sans-serif;
  text-align: center;

  padding: 6px 12px;
  border-radius: 999px;
  margin-bottom: 3px;

  cursor: pointer;
  box-shadow: none;
}

#timeline-label:hover {
  background: rgba(255,255,255,0.6);
}

#timeline-label:active {
  transform: scale(0.98);
}

#timeline-slider {
  -webkit-appearance: none;
  appearance: none;
  display: block;
  width: 100%;
  margin: 0;

  /* ⭐ 重點：視覺上還是細線，但手指可抓範圍變大 */
  height: 32px;
  background: transparent;
  border-radius: 999px;
  outline: none;

  /* ⭐ iPad / 手機避免整頁被滑走 */
  touch-action: none;
  -webkit-user-select: none;
  user-select: none;
}

#timeline-slider::-webkit-slider-runnable-track {
  height: 3px;
  background: rgba(255,255,255,0.25);
  border-radius: 999px;
}

#timeline-slider::-moz-range-track {
  height: 3px;
  background: rgba(255,255,255,0.25);
  border-radius: 999px;
}

/* ⭐ 這段才是滑塊 */
#timeline-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;

  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: #ffffff;

  cursor: pointer;
  box-shadow: 0 2px 6px rgba(0,0,0,0.25);

  /* ⭐ 讓白色圓點對齊 3px 時間軸中央 */
  margin-top: -4.5px;
}

#place-index-toggle {
  position: fixed;
  right: 18px;
  bottom: 44px;
  z-index: 9998;

  border: none;
  border-radius: 999px;
  padding: 6px 12px;

  background: rgba(255,255,255,0.78);

  -webkit-backdrop-filter: blur(6px);

  color: #333;
  font-size: 13px;
  font-family: sans-serif;

}

#place-index-panel {

/* 🌿 6. 共用照片區 HTML */
function normalizeDate(dateStr) {
  if (!dateStr) return null;

  let s = dateStr.replace("~", "-");

  const match = s.match(/^(\d{4})\.(\d{2})\.(\d{2})/);
  if (!match) return null;

  return `${match[1]}-${match[2]}-${match[3]}`;
}

function openPhotoViewer(photos, index) {
  viewerPhotos = photos;
  viewerIndex = index;
  renderPhotoViewer();
  document.getElementById('photo-viewer').classList.add('show');
}

function renderPhotoViewer() {
  const img = document.getElementById('photo-viewer-img');
  if (!viewerPhotos.length) return;

  viewerScale = 1;
  viewerOffsetX = 0;
  viewerOffsetY = 0;

  img.src = viewerPhotos[viewerIndex].img;
  img.alt = viewerPhotos[viewerIndex].title || "";

  applyPhotoZoom();
}

function applyPhotoZoom() {
  const img = document.getElementById('photo-viewer-img');

  img.style.setProperty('--photo-scale', viewerScale);
  img.style.setProperty('--photo-x', viewerOffsetX + 'px');
  img.style.setProperty('--photo-y', viewerOffsetY + 'px');
}

let isPhotoDragging = false;
let dragStartX = 0;
let dragStartY = 0;
let dragBaseX = 0;
let dragBaseY = 0;

function clampPhotoOffset() {
  const maxX = (window.innerWidth * (viewerScale - 1)) / 2;
  const maxY = (window.innerHeight * (viewerScale - 1)) / 2;

  viewerOffsetX = Math.max(-maxX, Math.min(maxX, viewerOffsetX));
  viewerOffsetY = Math.max(-maxY, Math.min(maxY, viewerOffsetY));
}

const photoViewerImg = document.getElementById('photo-viewer-img');

photoViewerImg.addEventListener('dragstart', function(e) {
  e.preventDefault();
});

photoViewerImg.addEventListener('pointerdown', function(e) {
  if (viewerScale <= 1) return;

  e.preventDefault();

  isPhotoDragging = true;
  dragStartX = e.clientX;
  dragStartY = e.clientY;

  dragBaseX = viewerOffsetX;
  dragBaseY = viewerOffsetY;

  photoViewerImg.classList.add('dragging');
  photoViewerImg.setPointerCapture(e.pointerId);
});

photoViewerImg.addEventListener('pointermove', function(e) {
  if (!isPhotoDragging) return;

  const dragSpeed = 1.6;

  viewerOffsetX = dragBaseX + (e.clientX - dragStartX) * dragSpeed;
  viewerOffsetY = dragBaseY + (e.clientY - dragStartY) * dragSpeed;

  clampPhotoOffset();
  applyPhotoZoom();
});

photoViewerImg.addEventListener('pointerup', function(e) {
  isPhotoDragging = false;
  photoViewerImg.classList.remove('dragging');

  try {
    photoViewerImg.releasePointerCapture(e.pointerId);
  } catch (err) {}
});

photoViewerImg.addEventListener('pointercancel', function() {
  isPhotoDragging = false;
  photoViewerImg.classList.remove('dragging');
});

function showNextPhoto() {
  if (!viewerPhotos.length) return;
  if (viewerIndex < viewerPhotos.length - 1) {
    viewerIndex++;
    renderPhotoViewer();
  }
}

function showPrevPhoto() {
  if (!viewerPhotos.length) return;
  if (viewerIndex > 0) {
    viewerIndex--;
    renderPhotoViewer();
  }
}

function closePhotoViewer() {
  document.getElementById('photo-viewer').classList.remove('show');
  document.getElementById('photo-viewer-img').src = "";
  document.getElementById('photo-viewer-img').alt = "";
  viewerPhotos = [];
  viewerIndex = 0;

  viewerScale = 1;
  viewerOffsetX = 0;
  viewerOffsetY = 0;
  applyPhotoZoom();
}

document.getElementById('photo-viewer-close').addEventListener('click', function (e) {
  e.stopPropagation();
  closePhotoViewer();
});

document.addEventListener('keydown', function (e) {
  const viewer = document.getElementById('photo-viewer');

  // 只有在大圖 viewer 打開時才作用
  if (!viewer.classList.contains('show')) return;

  // Ctrl + / Ctrl - 縮放滿版照片
  if (e.ctrlKey && (e.key === '+' || e.key === '=')) {
    e.preventDefault();
    viewerScale = Math.min(viewerScale + 0.3, 4);
    applyPhotoZoom();
    return;
  }

  if (e.ctrlKey && (e.key === '-' || e.key === '_')) {
    e.preventDefault();
    viewerScale = Math.max(viewerScale - 0.3, 1);

   if (viewerScale === 1) {
     viewerOffsetX = 0;
     viewerOffsetY = 0;
   }

   applyPhotoZoom();
    return;
  }

  // Ctrl + 0 回到原始大小
  if (e.ctrlKey && e.key === '0') {
    e.preventDefault();
    viewerScale = 1;
    viewerOffsetX = 0;
    viewerOffsetY = 0;
    applyPhotoZoom();
    return;
  }

  if (e.key === 'ArrowRight') {
    showNextPhoto();
  } else if (e.key === 'ArrowLeft') {
    showPrevPhoto();
  } else if (e.key === 'Escape') {
    closePhotoViewer();
  }


});


/* 🌿 10. 翻頁 */
function changeVisit(markerId, direction) {
  const item = repeatMarkers[markerId];
  if (!item) return;

  const total = item.visits.length;
  let currentIndex = repeatState[markerId] || 0;

  currentIndex += direction;

  if (currentIndex < 0) currentIndex = 0;
  if (currentIndex > total - 1) currentIndex = total - 1;

  repeatState[markerId] = currentIndex;

  const newHtml = createRepeatPopup(item.place, item.visits, markerId);
  openOverlay(newHtml);
}

function updateTimeline(index) {
  const currentItem = timelineItems[index];
  if (!currentItem) return;

  const currentDate = currentItem.date;

  markers.forEach(marker => {
    if (marker.timelineDate <= currentDate) {
      if (!map.hasLayer(marker)) {
        marker.addTo(map);
      }
    } else {
      if (map.hasLayer(marker)) {
        map.removeLayer(marker);
      }
    }
  });

  const currentDateText = currentDate.replace(/-/g, ".");
  timelineLabel.textContent = `Until ${currentDateText}`;

  // ⭐ 滑到哪一天，泡泡就對應哪一天的 marker
  currentTimelineMarker = currentItem.marker;
}

  updateTimeline(Number(this.value));
});

  if (!currentTimelineMarker) return;

});

function getSearchTextFromEntry(entry) {
  const item = entry.item;
  const place = item[3] || "";
  const meta = locationMeta[place] || { county: "", district: "" };

  let text = `${place} ${meta.county || ""} ${meta.district || ""}`;

  // 多次造訪的地點：只搜尋該次 visit 的內容
  if (entry.type === "repeat" && Array.isArray(item[8]) && item[8][entry.visitIndex]) {
    const visit = item[8][entry.visitIndex];

    text += ` ${visit.date || ""}`;
    text += ` ${visit.route || ""}`;
    text += ` ${visit.note || ""}`;

    if (Array.isArray(visit.photos)) {
      visit.photos.forEach(function(photo) {
        text += ` ${photo.title || ""}`;
      });
    }

    return text.toLowerCase();
  }

  // 一般單次地點：搜尋該筆地點自己的內容
  const date = item[0] || "";
  const route = item[4] || "";
  const photos = item[5];
  const note = item[6] || "";

  text += ` ${date} ${route} ${note}`;

  if (Array.isArray(photos)) {
    photos.forEach(function(photo) {
      text += ` ${photo.title || ""}`;
    });
  }

  return text.toLowerCase();
}

function getSearchDate(entry) {
  const item = entry.item;

  if (entry.type === "repeat" && Array.isArray(item[8]) && item[8][entry.visitIndex]) {
    return item[8][entry.visitIndex].date || "";
  }

  return item[0] || "";
}

function getSearchRoute(entry) {
  const item = entry.item;

  if (entry.type === "repeat" && Array.isArray(item[8]) && item[8][entry.visitIndex]) {
    return item[8][entry.visitIndex].route || "";
  }

  return item[4] || "";
}

function renderSearchResults(keyword) {
  const q = keyword.trim().toLowerCase();

  searchResults.innerHTML = "";

  if (!q) {
    searchResults.classList.remove("show");
    return;
  }

  const matched = placeMarkers.filter(function(entry) {
  return getSearchTextFromEntry(entry).includes(q);
});

  searchResults.classList.add("show");

  if (matched.length === 0) {
    searchResults.innerHTML = `<div class="search-empty">找不到相關地點</div>`;
    return;
  }

  matched.slice(0, 12).forEach(function(entry) {
    const item = entry.item;
    const place = item[3] || "";
    const date = getSearchDate(entry);

    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "search-result-btn";

    btn.innerHTML = `
      <div class="search-result-title">${place}</div>
      <div class="search-result-meta">${date}</div>
    `;

    btn.addEventListener("click", function() {
      const lat = item[1];
      const lng = item[2];

      map.setView([lat, lng], 13, {
        animate: true
      });

      entry.marker.fire("click");

      searchResults.classList.remove("show");
      placeSearchInput.blur();
    });

    searchResults.appendChild(btn);
  });
}

  timelineItems.forEach(item => {
    const county = item.county || "未分類";
    const district = item.district || "未分類";
    const place = item.place || "未命名地點";

    if (!grouped[county]) grouped[county] = {};
    if (!grouped[county][district]) grouped[county][district] = {};
    if (!grouped[county][district][place]) grouped[county][district][place] = [];

    grouped[county][district][place].push(item);
  });

  let html = "";

  const countyOrder = [
    "臺北市",
    "新北市",
    "基隆市",
    "宜蘭縣",
    "桃園市",
    "新竹縣",
    "苗栗縣", 
    "臺中市",
    "臺中縣",
    "彰化縣",
    "南投縣",
    "雲林縣",
    "嘉義縣",
    "臺南市",
    "臺南縣",
    "高雄市",
    "屏東縣",
    "臺東縣",
    "花蓮縣",
    "澎湖縣",
    "金門縣",
    "連江縣",
    "未分類"
  ];

  Object.keys(grouped)
    .sort((a, b) => {
      const ai = countyOrder.indexOf(a);
      const bi = countyOrder.indexOf(b);

      if (ai !== -1 && bi !== -1) return ai - bi;
      if (ai !== -1) return -1;
      if (bi !== -1) return 1;

      return a.localeCompare(b, "zh-Hant");
    })
    .forEach(county => {
      html += `<div class="index-county">${county}</div>`;

      Object.keys(grouped[county])
        .sort((a, b) => a.localeCompare(b, "zh-Hant"))
        .forEach(district => {
          html += `<div class="index-district">${district}</div>`;

          Object.keys(grouped[county][district])
            .sort((placeA, placeB) => {
              const firstDateA = grouped[county][district][placeA]
                .map(item => item.date)
                .sort()[0];

              const firstDateB = grouped[county][district][placeB]
                .map(item => item.date)
                .sort()[0];

              return firstDateA.localeCompare(firstDateB);
            })
            .forEach(place => {
              const items = grouped[county][district][place]
                .slice()
                .sort((a, b) => a.date.localeCompare(b.date));

              html += `
                <div class="index-place-row">
                  <span class="index-place-name">${place}</span>
                  <span class="index-date-list">
                    ${items.map(item => `
                      <button 
                        class="index-date-btn index-open-btn" 
                        type="button" 
                        data-date="${item.date}"
                      >
                        ${item.rawDate || item.date}
                      </button>
                    `).join("")}
                  </span>
                </div>
              `;
            });
        });
    });

  content.innerHTML = html + `<div class="index-bottom-spacer"></div>`;

  bindIndexButtons();
}


/* 🌿 依時間：月份 > 日期與地點 */
function buildTimeIndex(content) {
  const grouped = {};

  timelineItems
    .slice()
    .sort((a, b) => a.date.localeCompare(b.date))
    .forEach(item => {
      const month = item.date.slice(0, 7).replace("-", ".");

      if (!grouped[month]) {
        grouped[month] = [];
      }

      grouped[month].push(item);
    });

  let html = "";

  Object.keys(grouped)
    .sort()
    .forEach(month => {
      html += `<div class="time-month">${month}</div>`;

      grouped[month].forEach(item => {
        html += `
          <div class="time-index-row">
            <button
              class="index-time-btn index-open-btn"
              type="button"
              data-date="${item.date}"
            >
              <span class="index-time-date">${item.rawDate || item.date}</span><span class="index-time-divider">｜</span><span class="index-time-place">${item.place}</span>
            </button>
          </div>
        `;
      });
    });

  content.innerHTML = html + `<div class="index-bottom-spacer"></div>`;

  bindIndexButtons();
}


/* 🌿 點地點清單中的日期或地點：同步時間軸並打開字卡 */
function bindIndexButtons() {
  const content = document.getElementById('place-index-content');

  content.querySelectorAll('.index-open-btn').forEach(btn => {
    btn.addEventListener('click', function () {
      const date = this.dataset.date;
      const index = timelineItems.findIndex(item => item.date === date);

      if (index < 0) return;

      const item = timelineItems[index];

      timelineSlider.value = index;
      updateTimeline(index);

      item.marker.fire('click');

      document.getElementById('place-index-panel').classList.remove('show');
    });
  });
}

let touchStartX = 0;
let touchStartY = 0;
let touchEndX = 0;
let touchEndY = 0;
let isPinching = false;

const viewerCard = document.getElementById('photo-viewer');

viewerCard.addEventListener('touchstart', function (e) {
  isPinching = e.touches.length > 1;

  if (isPinching) return;

  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

viewerCard.addEventListener('touchmove', function (e) {
  if (e.touches.length > 1) {
    isPinching = true;
  }
}, { passive: true });

viewerCard.addEventListener('touchend', function (e) {
  if (isPinching) {
    if (e.touches.length === 0) {
      isPinching = false;
    }
    return;
  }

  touchEndX = e.changedTouches[0].clientX;
  touchEndY = e.changedTouches[0].clientY;

  const diffX = touchEndX - touchStartX;
  const diffY = touchEndY - touchStartY;

  if (Math.abs(diffY) > 80 && Math.abs(diffY) > Math.abs(diffX)) {
    closePhotoViewer();
    return;
  }

  if (Math.abs(diffX) > 60 && Math.abs(diffX) > Math.abs(diffY)) {
    if (diffX < 0) {
      showNextPhoto();
    } else {
      showPrevPhoto();
    }
  }
}, { passive: true });


document.addEventListener('wheel', function (e) {
  const scroller = e.target.closest('.photo-scroll');
  if (!scroller) return;

  // 如果主要是垂直滾動，就把它轉成水平滾動
  if (Math.abs(e.deltaY) > Math.abs(e.deltaX)) {
    e.preventDefault();
    scroller.scrollLeft += e.deltaY;
  }
}, { passive: false });

/* 🌟 Google 登入 / 登出 */
const googleLoginBtn = document.getElementById("google-login-btn");
const googleLogoutBtn = document.getElementById("google-logout-btn");

  } else {

});

/* 🌟 新增願望 */
const wishSubmit = document.getElementById("wish-submit");
const wishMessage = document.getElementById("wish-message");

wishSubmit.addEventListener("click", function () {
  const user = auth.currentUser;

  if (!user) {
    wishMessage.textContent = "請先使用 Google 登入，再新增願望。";
    auth.signInWithPopup(googleProvider).catch(function (error) {
      console.error(error);
      wishMessage.textContent = "登入失敗，請再試一次。";
    });
    return;
  }

  const name = document.getElementById("wish-name").value.trim();
  const lat = Number(document.getElementById("wish-lat").value);
  const lng = Number(document.getElementById("wish-lng").value);
  const note = document.getElementById("wish-note").value.trim();

  if (!name || Number.isNaN(lat) || Number.isNaN(lng)) {
    wishMessage.textContent = "請填寫地點名稱、緯度和經度。";
    return;
  }

  if (lat < -90 || lat > 90 || lng < -180 || lng > 180) {
    wishMessage.textContent = "緯度或經度格式好像不太對。";
    return;
  }

  const newWish = {
    name: name,
    lat: lat,
    lng: lng,
    note: note,
    authorName: user.displayName || "",
    authorEmail: user.email || "",
    authorUid: user.uid,
    createdAt: new Date().toISOString()
  };

  wishesRef.push(newWish)
    .then(function () {
      wishMessage.textContent = "已加入願望清單 ✨";

      document.getElementById("wish-name").value = "";
      document.getElementById("wish-lat").value = "";
      document.getElementById("wish-lng").value = "";
      document.getElementById("wish-note").value = "";
    })
    .catch(function (error) {
      console.error(error);
      wishMessage.textContent = "新增失敗，可能是登入或資料庫權限問題。";
    });
});

/* 🌟 即時讀取 Firebase 願望清單 */
wishesRef.on("value", function (snapshot) {
  latestWishes = snapshot.val() || {};

  if (wishlistVisible) {
    renderWishMarkers();
  } else {
    clearWishMarkers();
  }
});

function clearWishMarkers() {
  Object.keys(wishMarkers).forEach(function (id) {
    map.removeLayer(wishMarkers[id]);
  });
  wishMarkers = {};
}

function renderWishMarkers() {
  clearWishMarkers();

  Object.keys(latestWishes).forEach(function (id) {
    const wish = latestWishes[id];

    if (
      !wish ||
      typeof wish.lat !== "number" ||
      typeof wish.lng !== "number" ||
      !wish.name
    ) {
      return;
    }

    const popupHtml = `
      <div style="font-family:sans-serif; min-width:160px;">
        <b>${escapeHtml(wish.name)}</b>
        ${wish.note ? `<p style="margin:6px 0 0; font-size:13px;">${escapeHtml(wish.note)}</p>` : ""}
        ${wish.authorName ? `<p style="margin:6px 0 0; font-size:12px; color:#888;">by ${escapeHtml(wish.authorName)}</p>` : ""}
      </div>
    `;

    const marker = L.marker([wish.lat, wish.lng], { icon: wishIcon })
      .addTo(map)
      .bindPopup(popupHtml);

    wishMarkers[id] = marker;
  });
}

/* 避免輸入內容破壞 HTML */
function escapeHtml(text) {
  return String(text)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}
