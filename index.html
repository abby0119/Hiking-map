<!DOCTYPE html>

<head>
  <meta charset="utf-8" />
  <title>我們的地圖</title>

  <style>
    body { margin:0; padding:0; }
    #map { width:100%; height:100vh; }

    .photo-scroll {
      display: flex;
      align-items: flex-start;
      overflow-x: auto;
      gap: 8px;
      padding-bottom: 6px;
      -webkit-overflow-scrolling: touch;
    }

    .photo-scroll::-webkit-scrollbar {
      height: 4px;
    }
    .photo-scroll::-webkit-scrollbar-track {
      background: transparent;
    }
    .photo-scroll::-webkit-scrollbar-thumb {
      background: rgba(0,0,0,0.25);
      border-radius: 10px;
    }

    .visit-nav {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
      flex-shrink: 0;
    }

    .visit-btn {
      border: none;
      background: #f3f3f3;
      border-radius: 999px;
      width: 32px;
      height: 32px;
      font-size: 18px;
      cursor: pointer;
      line-height: 1;
    }

    .visit-btn:hover {
      background: #e5e5e5;
    }

    .visit-indicator {
      font-size: 12px;
      color: #666;
      min-width: 76px;
      text-align: center;
    }

    /* overlay */
    #overlay {
      position: fixed;
      inset: 0;
      display: none;
      justify-content: center;
      align-items: center;
      background: rgba(0, 0, 0, 0.35);
      z-index: 9999;
      padding: 16px;
      box-sizing: border-box;
    }

    #overlay.show {
      display: flex;
    }

   .overlay-card {
  position: relative;
  width: min(360px, calc(100vw - 24px));
  max-height: min(88vh, 760px);
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.22);
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 0 16px 14px;
  box-sizing: border-box;
}

@media (max-width: 767px) {
  .overlay-card {
    width: min(320px, calc(100vw - 24px));
    max-height: 82vh;
  }

  .overlay-body {
    padding: 10px 6px 4px;
  }

  .photo-scroll img {
    height: 220px !important;
  }
}

@media (min-width: 768px) {
  .overlay-card {
    width: min(360px, calc(100vw - 40px));
    max-height: min(88vh, 760px);
  }

  .overlay-body {
    padding: 12px 10px 8px;
  }

  .photo-scroll img {
    height: clamp(220px, 32vh, 320px) !important;
  }
}

@media (min-width: 768px) and (orientation: landscape) {
  .overlay-card {
    max-height: 84vh;
  }

  .photo-scroll img {
    height: clamp(200px, 28vh, 280px) !important;
  }
}
    
    .overlay-close {
      position: sticky;
      top: 0;
      margin-left: auto;
      display: flex;
      justify-content: flex-end;
      z-index: 2;
      background: linear-gradient(to bottom, rgba(255,255,255,1), rgba(255,255,255,0.9));
      padding-bottom: 6px;
    }

    .overlay-close button {
      border: none;
      background: #f3f3f3;
      border-radius: 999px;
      width: 34px;
      height: 34px;
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
    }

    .overlay-close button:hover {
      background: #e5e5e5;
    }

    .overlay-body {
      padding: 10px 6px 4px;

    }

#photo-viewer {

  inset: 0;
  display: none;
  justify-content: center;
  align-items: center;
  background: #000; /* 整個畫面黑色 */

}

#photo-viewer.show {

}

#photo-viewer-img {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: contain; /* 保持完整圖片 */
  background: #000;
}

/* 🌿 5. repeat 點目前第幾頁 */
const repeatState = {};
const repeatMarkers = {};


/* 🌿 6. 共用照片區 HTML */
function createPhotoHTML(photos, imgHeight = 220) {
  const photosJson = encodeURIComponent(JSON.stringify(photos));

  return `
    <div class="photo-scroll">
      ${photos.map((p, i) => `
        <div style="
          flex-shrink:0;
          display:flex;
          flex-direction:column;
          align-items:flex-start;
          justify-content:flex-start;
        ">
          <img src="${p.img}"
            alt="${p.title || ''}"
            class="clickable-photo"
            data-photos="${photosJson}"
            data-index="${i}"
            style="
              width:auto;
              height:${imgHeight}px;
              border-radius:10px;
              display:block;
              cursor:pointer;
            ">

          <div style="
            width:0;
            min-width:100%;
            max-width:100%;
            font-size:14px;
            color:#444;
            margin-top:8px;
            flex-grow:1;
            display:flex;
            align-items:flex-start;
            text-align:left;
            white-space:normal;
            overflow-wrap:anywhere;
            word-break:break-word;
            line-height:1.35;
            box-sizing:border-box;
          ">
            ${p.title}
          </div>
        </div>
      `).join("")}
    </div>
  `;
}


/* 🌿 7. 單次卡片 */
function createSinglePopup(date, place, route, photos, note) {
  return `
    <div style="font-size:16px;">
      🌿 <b>${date}</b><br><br>
    </div>

    <div style="display:flex; align-items:center; gap:4px; font-size:16px;">
      <span>📍</span>
      <b>${place}</b>
    </div>

    <div style="font-size:14px;">
      ${route}
      <br><br>
    </div>

    ${createPhotoHTML(photos, 220)}

    <div style="
      font-size:14px;
      line-height:1.5;
      margin-top:10px;
      padding-bottom:8px;
    ">
      ${note}
    </div>
  `;
}


/* 🌿 8. repeat 卡片 */
function createRepeatPopup(place, visits, markerId) {
  let currentIndex = repeatState[markerId] || 0;
  if (currentIndex < 0) currentIndex = 0;
  if (currentIndex > visits.length - 1) currentIndex = visits.length - 1;

  const visit = visits[currentIndex];

  return `
    <div class="visit-nav" style="margin-bottom:8px;">
      <button
        type="button"
        class="visit-btn"
        onclick="event.stopPropagation(); changeVisit('${markerId}', -1); return false;"
      >‹</button>

      <div class="visit-indicator">${currentIndex + 1} / ${visits.length}</div>

      <button
        type="button"
        class="visit-btn"
        onclick="event.stopPropagation(); changeVisit('${markerId}', 1); return false;"
      >›</button>
    </div>

    <div style="font-size:16px;">
      🌿 <b>${visit.date}</b><br><br>
    </div>

    <div style="display:flex; align-items:center; gap:4px; font-size:16px;">
      <span>📍</span>
      <b>${place}</b>
    </div>

    <div style="font-size:14px;">
      ${visit.route}
      <br><br>
    </div>

    ${createPhotoHTML(visit.photos, 200)}

    <div style="
      font-size:14px;
      line-height:1.5;
      margin-top:10px;
      padding-bottom:8px;
    ">
      ${visit.note}
    </div>
  `;
}


/* 🌿 9. overlay 開關 */
function openOverlay(html) {
  const overlay = document.getElementById('overlay');
  const content = document.getElementById('overlay-content');

  content.innerHTML = html;
  overlay.classList.add('show');
  document.body.style.overflow = 'hidden';

  const photos = content.querySelectorAll('.clickable-photo');
  photos.forEach(photo => {
    photo.addEventListener('click', function () {
      const photosData = JSON.parse(decodeURIComponent(this.dataset.photos));
      const index = Number(this.dataset.index);
      openPhotoViewer(photosData, index);
    });
  });
}

function closeOverlay() {
  const overlay = document.getElementById('overlay');
  overlay.classList.remove('show');
  document.body.style.overflow = '';
}

document.getElementById('overlay').addEventListener('click', function (e) {
  if (e.target.id === 'overlay') {
    closeOverlay();
  }
});

document.getElementById('overlay-card').addEventListener('click', function (e) {
  e.stopPropagation();
});

function openPhotoViewer(photos, index) {
  viewerPhotos = photos;
  viewerIndex = index;
  renderPhotoViewer();
  document.getElementById('photo-viewer').classList.add('show');
}

function renderPhotoViewer() {
  const img = document.getElementById('photo-viewer-img');
  if (!viewerPhotos.length) return;

  img.src = viewerPhotos[viewerIndex].img;
  img.alt = viewerPhotos[viewerIndex].title || "";
}

function showNextPhoto() {
  if (!viewerPhotos.length) return;
  if (viewerIndex < viewerPhotos.length - 1) {
    viewerIndex++;
    renderPhotoViewer();
  }
}

function showPrevPhoto() {
  if (!viewerPhotos.length) return;
  if (viewerIndex > 0) {
    viewerIndex--;
    renderPhotoViewer();
  }
}

function closePhotoViewer() {
  document.getElementById('photo-viewer').classList.remove('show');
  document.getElementById('photo-viewer-img').src = "";
  document.getElementById('photo-viewer-img').alt = "";
  viewerPhotos = [];
  viewerIndex = 0;
}

document.addEventListener('keydown', function (e) {
  const viewer = document.getElementById('photo-viewer');

  // 只有在大圖 viewer 打開時才作用
  if (!viewer.classList.contains('show')) return;

  if (e.key === 'ArrowRight') {
    showNextPhoto();
  } else if (e.key === 'ArrowLeft') {
    showPrevPhoto();
  } else if (e.key === 'Escape') {
    closePhotoViewer();
  }
});

document.getElementById('photo-viewer').addEventListener('click', function () {
  closePhotoViewer();
});


/* 🌿 10. 翻頁 */
function changeVisit(markerId, direction) {
  const item = repeatMarkers[markerId];
  if (!item) return;

  const total = item.visits.length;
  let currentIndex = repeatState[markerId] || 0;

  currentIndex += direction;

  if (currentIndex < 0) currentIndex = 0;
  if (currentIndex > total - 1) currentIndex = total - 1;

  repeatState[markerId] = currentIndex;

  const newHtml = createRepeatPopup(item.place, item.visits, markerId);
  openOverlay(newHtml);
}

/* 🌿 11. 建立 markers */
data.forEach((item, idx) => {
  let [
    date, lat, lng,
    place, route,
    photos,
    note, status,
    visits
  ] = item;

  let color = iconColor[status] || "#64b5f6";

  let marker = L.marker([lat, lng], {
    icon: createPinIcon(color)
  }).addTo(map);

  const markerId = `marker-${idx}`;

  if (status === "repeat" && Array.isArray(visits) && visits.length > 0) {
    repeatState[markerId] = 0;
    repeatMarkers[markerId] = {
      marker: marker,
      place: place,
      visits: visits
    };

    marker.on('click', function () {
      const html = createRepeatPopup(place, visits, markerId);
      openOverlay(html);
    });

  } else {
    marker.on('click', function () {
      const html = createSinglePopup(date, place, route, photos, note);
      openOverlay(html);
    });
  }
});
  let touchStartX = 0;
let touchEndX = 0;

const viewerCard = document.getElementById('photo-viewer');

viewerCard.addEventListener('touchstart', function (e) {
  touchStartX = e.changedTouches[0].clientX;
}, { passive: true });

viewerCard.addEventListener('touchend', function (e) {
  touchEndX = e.changedTouches[0].clientX;

  const diff = touchEndX - touchStartX;

  if (Math.abs(diff) < 40) return;

  if (diff < 0) {
    showNextPhoto();
  } else {
    showPrevPhoto();
  }
}, { passive: true });

document.addEventListener('wheel', function (e) {
  const scroller = e.target.closest('.photo-scroll');
  if (!scroller) return;

  // 如果主要是垂直滾動，就把它轉成水平滾動
  if (Math.abs(e.deltaY) > Math.abs(e.deltaX)) {
    e.preventDefault();
    scroller.scrollLeft += e.deltaY;
  }
}, { passive: false });

</script>
