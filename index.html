<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8" />
  <title>我們的地圖</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    body { margin:0; padding:0; }
    #map { width:100%; height:100vh; }

    .photo-scroll {
      display: flex;
      align-items: flex-start;
      overflow-x: auto;
      gap: 8px;
      padding-bottom: 6px;
      -webkit-overflow-scrolling: touch;
    }

    .photo-scroll::-webkit-scrollbar {
      height: 4px;
    }
    .photo-scroll::-webkit-scrollbar-track {
      background: transparent;
    }
    .photo-scroll::-webkit-scrollbar-thumb {
      background: rgba(0,0,0,0.25);
      border-radius: 10px;
    }

    /* 🌿 多次 visit 橫向滑動 */
    .visit-scroll {
      display: flex;
      flex: 1;
      width: 100%;
      overflow-x: auto;
      overflow-y: hidden;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
      box-sizing: border-box;
    }

    .visit-scroll::-webkit-scrollbar {
      display: none;
    }

   .visit-page {
  flex: 0 0 100%;
  width: 100%;
  min-width: 100%;
  max-width: 100%;
  scroll-snap-align: start;
  box-sizing: border-box;
  height: 100%;
  overflow: hidden;
}

.visit-page-inner {
  height: 100%;
  overflow-y: auto;
  box-sizing: border-box;
  padding-right: 2px;
  padding-bottom: 16px;
}

    .visit-nav {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
      padding-bottom: 2px;
    }

    .visit-btn {
      border: none;
      background: #f3f3f3;
      border-radius: 999px;
      width: 30px;
      height: 30px;
      font-size: 18px;
      cursor: pointer;
      line-height: 1;
    }

    .visit-btn:hover {
      background: #e5e5e5;
    }

    .visit-indicator {
      font-size: 12px;
      color: #666;
      min-width: 56px;
      text-align: center;
    }
  </style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

/* 🌿 1. 地圖 */
var map = L.map('map').setView([25.1726, 121.5004], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);


/* 🌿 2. 狀態顏色 */
const iconColor = {
  alone: "#64b5f6",     // 💙 自己
  together: "#ff9800",  // 🧡 昱安
  repeat: "#c2185b"     // 💜 多次
};


/* 🌿 3. 水滴 icon */
function createPinIcon(color) {
  return L.divIcon({
    className: "",
    html: `<div style="
      width: 18px;
      height: 18px;
      background: ${color};
      border: 2px solid white;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    "></div>`,
    iconSize: [20, 20],
    iconAnchor: [10, 10]
  });
}


/* 🌿 4. 資料 */
const data = [
  [
    "2025.08.16",
    25.17290093590673, 
    121.50003254869834,
    "向天池",
    "二子坪>面天山>向天山>向天池",
    [
      { img: "photo1.jpg", title: "狹瓣八仙花" },
    ],
    "今天自己去爬山，看到一片乾燥的狹瓣八仙花萼片在發光，採回家送昱安",
    "alone"
  ],

  [
    "2025.08.23-25",
    22.179908, 
    120.891753,
    "墾丁",
    "Day1龍磐公園>星星草原>Day2旭海>199線道>Day3瑪家",
    [
      { img: "photo2.jpg", title: "厚殼鴨腱藤" },
      { img: "photo2a.jpg", title: "彩色石頭和貝殼" }
    ],
    "這周末去墾丁出差，在旭海撿海漂種子，最大最圓最喜歡的厚殼鴨腱藤送給寶貝人",
    "alone"
  ],

  [
    "2025.09.13",
    25.183906,
    121.519981,
    "二子坪",
    "大屯自然公園>二子坪>大屯車道",
    [
      { img: "photo3.jpg", title: "毛藥花" },
      { img: "photo3a.jpg", title: "杜英落葉" },
      { img: "photo3b.jpg", title: "不怕人的樹鵲" }
    ],
    "今天昱安感冒，我還是自己爬山，撿了紅色杜英落葉，希望寶貝能快快好起來",
    "alone"
  ],

  /* 🌿 示範：同一地點多次造訪 */
  [
    null,
    25.149086,
    121.588539,
    "荷蘭古道",
    null,
    null,
    null,
    "repeat",
    [
      {
        date: "2025.09.20",
        route: "萬溪產道支線頂山站>荷蘭古道>北五指山草原",
        photos: [
          { img: "photo4.jpg", title: "八角蓮長出第二片葉子" },
          { img: "photo4a.jpg", title: "仰望墨點櫻桃" },
          { img: "photo4b.jpg", title: "鄧氏胡頹子結實纍纍" },
          { img: "photo4c.jpg", title: "梵天花" },
          { img: "photo4d.jpg", title: "草原藍天" },
          { img: "photo4e.jpg", title: "菇菇" }
        ],
        note: "我們第一次一起爬山，帶寶貝看八角蓮，是這幾個月來最快樂的周末"
      },
      {
        date: "2025.10.05",
        route: "萬溪產道支線頂山站>荷蘭古道>北五指山草原",
        photos: [
          { img: "photo4.jpg", title: "第二次又來看八角蓮" },
          { img: "photo4d.jpg", title: "這次天氣更藍" }
        ],
        note: "第二次再訪，覺得同一條路不同季節看起來真的很不一樣。"
      }
    ]
  ],

  [
    "2025.09.27-30",
    24.459073127542787,
    121.26030452897538,
    "大霸尖山",
    "Day0觀霧山莊>Day2大鹿林道>九九山莊>Day3大霸尖山>Day4下山",
    [
      { img: "photo5.jpg", title: "雙鋸齒玄參" },
      { img: "photo5a.jpg", title: "小木通" },
      { img: "photo5b.jpg", title: "星空大霸" },
      { img: "photo5c.jpg", title: "曙光(快累死了)" },
      { img: "photo5d.jpg", title: "向山前進" },
      { img: "photo5e.jpg", title: "看到大霸尖山酢漿草就有力氣繼續往前走了" },
      { img: "photo5f.jpg", title: "化香樹果實(回程才有力氣撿東西)" }
    ],
    "這個週末我去爬大霸尖山，感謝寶貝載我去新竹，希望以後能一起去爬百岳",
    "alone"
  ]
];


/* 🌿 5. 共用照片區 HTML */
function createPhotoHTML(photos, imgHeight = 260) {
  return `
    <div class="photo-scroll">
      ${photos.map(p => `
        <div style="
          flex-shrink:0;
          display:flex;
          flex-direction:column;
          align-items:flex-start;
          justify-content:flex-start;
        ">
          <img src="${p.img}" style="
            width:auto;
            height:${imgHeight}px;
            border-radius:10px;
            display:block;
          ">

          <div style="
            width:0;
            min-width:100%;
            max-width:100%;
            font-size:14px;
            color:#444;
            margin-top:8px;
            flex-grow:1;
            display:flex;
            align-items:flex-start;
            text-align:left;
            white-space:normal;
            overflow-wrap:anywhere;
            word-break:break-word;
            line-height:1.35;
            box-sizing:border-box;
          ">
            ${p.title}
          </div>
        </div>
      `).join("")}
    </div>
  `;
}


/* 🌿 6. 單次 popup */
function createSinglePopup(date, place, route, photos, note) {
  return `
    <div style="
      width:260px;
      height:465px;
      font-family:sans-serif;
      display:flex;
      flex-direction:column;
      overflow-y:auto;
      padding:4px 2px;
      box-sizing:border-box;
    ">

      <div style="font-size:16px;">
        🌿 <b>${date}</b><br><br>
      </div>

      <div style="display:flex; align-items:center; gap:4px; font-size:16px;">
        <span>📍</span>
        <b>${place}</b>
      </div>

      <div style="font-size:14px;">
        ${route}
        <br><br>
      </div>

      ${createPhotoHTML(photos)}

      <div style="font-size:14px;">
        <br>
        ${note}
      </div>
    </div>
  `;
}


/* 🌿 7. 多次 visit popup */
function createRepeatPopup(place, visits, popupId) {
  return `
    <div style="
      width:260px;
      height:465px;
      font-family:sans-serif;
      display:flex;
      flex-direction:column;
      overflow-y:auto;
      padding:4px 2px;
      box-sizing:border-box;
    ">

      <div id="visit-scroll-${popupId}" class="visit-scroll">
        ${visits.map(visit => `
  <div class="visit-page">
    <div class="visit-page-inner">
      <div style="font-size:16px;">
        🌿 <b>${visit.date}</b><br><br>
      </div>

      <div style="display:flex; align-items:center; gap:4px; font-size:16px;">
        <span>📍</span>
        <b>${place}</b>
      </div>

      <div style="font-size:14px;">
        ${visit.route}
        <br><br>
      </div>

      ${createPhotoHTML(visit.photos, 220)}

      <div style="font-size:14px;">
        <br>
        ${visit.note}
      </div>
    </div>
  </div>
`).join("")}

      <div class="visit-nav">
        <button class="visit-btn" onclick="scrollVisit('${popupId}', -1)">‹</button>
        <div id="visit-indicator-${popupId}" class="visit-indicator">第 1 / ${visits.length} 次</div>
        <button class="visit-btn" onclick="scrollVisit('${popupId}', 1)">›</button>
      </div>
    </div>
  `;
}


/* 🌿 8. 箭頭控制 */
function scrollVisit(popupId, direction) {
  const scroller = document.getElementById(`visit-scroll-${popupId}`);
  const indicator = document.getElementById(`visit-indicator-${popupId}`);
  if (!scroller) return;

  const pageWidth = scroller.clientWidth;
  const maxIndex = scroller.children.length - 1;
  let index = Math.round(scroller.scrollLeft / pageWidth);

  index += direction;
  if (index < 0) index = 0;
  if (index > maxIndex) index = maxIndex;

  scroller.scrollTo({
    left: index * pageWidth,
    behavior: "smooth"
  });

  setTimeout(() => {
    const pages = scroller.querySelectorAll('.visit-page-inner');
    pages.forEach(page => page.scrollTop = 0);

    if (indicator) {
      indicator.textContent = `第 ${index + 1} / ${maxIndex + 1} 次`;
    }
  }, 250);
}


/* 🌿 9. popup 互動 */
function bindPopupInteractions(marker, map) {
  marker.on('popupopen', function (e) {
    const container = e.popup.getElement();
    const photoScrollers = container.querySelectorAll('.photo-scroll');
    const visitScroller = container.querySelector('.visit-scroll');

    photoScrollers.forEach(scroller => {
      L.DomEvent.disableClickPropagation(scroller);
      L.DomEvent.disableScrollPropagation(scroller);

      scroller.addEventListener('wheel', function (ev) {
        ev.stopPropagation();
      });
    });

    if (visitScroller) {
      L.DomEvent.disableClickPropagation(visitScroller);
      L.DomEvent.disableScrollPropagation(visitScroller);

      visitScroller.addEventListener('wheel', function (ev) {
        ev.stopPropagation();
      });

      const indicator = container.querySelector('.visit-indicator');

     visitScroller.addEventListener('scroll', function () {
  const pageWidth = visitScroller.clientWidth;
  if (!pageWidth) return;

  const index = Math.round(visitScroller.scrollLeft / pageWidth);
  const total = visitScroller.children.length;

  if (indicator) {
    indicator.textContent = `第 ${index + 1} / ${total} 次`;
  }

  clearTimeout(visitScroller._scrollTimer);
  visitScroller._scrollTimer = setTimeout(() => {
    const pages = visitScroller.querySelectorAll('.visit-page-inner');
    pages.forEach(page => page.scrollTop = 0);
  }, 120);
});
    }

    setTimeout(() => {
      const latlng = e.popup._latlng;
      const px = map.project(latlng);
      px.y -= e.popup._container.clientHeight / 2;

      map.panTo(map.unproject(px), {
        animate: true,
        duration: 0.6
      });
    }, 50);
  });
}


/* 🌿 10. 建立 markers */
data.forEach((item, idx) => {

  let [
    date, lat, lng,
    place, route,
    photos,
    note, status,
    visits
  ] = item;

  let color = iconColor[status] || "#64b5f6";

  let marker = L.marker([lat, lng], {
    icon: createPinIcon(color)
  }).addTo(map);

  const popupId = `popup-${idx}`;

  let popupHTML = "";

  if (status === "repeat" && Array.isArray(visits) && visits.length > 0) {
    popupHTML = createRepeatPopup(place, visits, popupId);
  } else {
    popupHTML = createSinglePopup(date, place, route, photos, note);
  }

  marker.bindPopup(popupHTML, {
    autoPan: false,
    maxWidth: 320,
    minWidth: 260
  });

  bindPopupInteractions(marker, map);
});

</script>

</body>
</html>
